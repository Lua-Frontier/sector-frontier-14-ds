- type: entity
  parent: MarkerBase
  id: ERCPlanFolderSpawner
  components:
  - type: Sprite
    layers:
    - state: pink
    - sprite: Objects/Misc/folders.rsi
      state: folder-erc
  - type: RandomSpawner
    prototypes:
    - BoxFolderERCPlanChertalet
    - BoxFolderERCPlanChilipizdriki
    chance: 1.0
    offset: 0.0

- type: entity
  id: BoxFolderERCPlanChertalet
  parent: BoxFolderBase
  name: Папка Директора Исследований
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-erc
    - state: folder-base
  - type: StorageFill
    contents:
    - id: ERCPlanChertalet
    sound:
      path: /Audio/Effects/packetrip.ogg

- type: entity
  id: BoxFolderERCPlanChilipizdriki
  parent: BoxFolderBase
  name: Папка Директора Исследований
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-erc
    - state: folder-base
  - type: StorageFill
    contents:
    - id: ERCPlanChilipizdriki
    - id: ERCPlanChilipizdrikiReport
      amount: 2
    sound:
      path: /Audio/Effects/packetrip.ogg
