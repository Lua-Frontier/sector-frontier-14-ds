- type: entity
  parent: MarkerBase
  id: ERCPlanFolderSpawner
  components:
  - type: Sprite
    layers:
    - state: pink
    - sprite: Objects/Misc/folders.rsi
      state: folder-erc
      state: folder-base
  - type: EntityTableSpawner
    offset: 0.4
    table: !type:NestedSelector
      tableId: ERCPlanFolderTable

- type: entityTable
  id: ERCPlanFolderTable
  table: !type:GroupSelector
    children:
    - BoxFolderERCPlanChertalet
    - BoxFolderERCPlanChilipizdriki



- type: entity
  id: BoxFolderERCPlanChertalet
  parent: BaseItem
  name: Папка Директора Исследований
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-erc
    - state: folder-base
  - type: SpawnItemsOnUse
    items:
    - id: ERCPlanChertalet
    sound:
      path: /Audio/Effects/packetrip.ogg
  - type: Appearance

- type: entity
  id: BoxFolderERCPlanChilipizdriki
  parent: BaseItem
  name: Папка Директора Исследований
  components:
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-erc
    - state: folder-base
  - type: SpawnItemsOnUse
    items:
    - id: ERCPlanChilipizdriki
    - id: ERCPlanChilipizdrikiReport
      count: 2
    sound:
      path: /Audio/Effects/packetrip.ogg
  - type: Appearance
