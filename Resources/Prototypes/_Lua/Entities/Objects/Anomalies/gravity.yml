- type: entity
  parent: ZoneAnomalyBase
  id: ZoneAnomalyBaseGravity
  abstract: true
  components:
  - type: STAnomalyTips
    icon:
      sprite: /Textures/_Lua/Interface/Overlays/anomaly_tips.rsi
      state: gravity

- type: entity
  id: ZoneAnomalyGravi
  parent: ZoneAnomalyBaseGravity
  suffix: Stalker, Gravi, Anomaly
  components:
    - type: ZoneAnomalyTriggerStartCollide
    - type: ZoneAnomalyEffectDamage
      damageUpdate: true
      damage:
        types:
          Compression: 0.5
    - type: ZoneAnomalyEffectGravityWell
      distance: 1.5
      period: 0.005
      radial: 40
      tangential: 0.1
      gradient: Linear
    - type: Stealth
    - type: ZoneAnomalyEffectStealth
      idle: -0.3
      activated: 1
    - type: ZoneAnomaly
      detectedLevel: 1
      activationDelay: 10
      preparingDelay: 0
      chargeTime: 5
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/gravi.rsi
      layers:
        - state: idle
          map: ["base"]
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: active }
            Charging: { state: charging }
            Idle: { state: idle }
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 4
      sound:
        path: /Audio/_Lua/Effects/anomaly_gravy_idle.ogg

- type: entity
  id: ZoneAnomalyGrabber
  parent: ZoneAnomalyBaseGravity
  suffix: Stalker, Grabber, Anomaly
  components:
    - type: ZoneAnomalyTriggerStartCollide
    - type: ZoneAnomalyEffectDamage
      damageUpdate: true
      damage:
        types:
          Compression: 2
    - type: ZoneAnomalyEffectGravityWell
      distance: 1.5
      period: 0.005
      radial: 10
      tangential: 0.1
      gradient: Linear
    - type: Stealth
    - type: ZoneAnomalyEffectStealth
      idle: -0.3
      activated: 1
    - type: ZoneAnomaly
      detectedLevel: 2
      activationDelay: 12
      preparingDelay: 0
      chargeTime: 7
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/grabber.rsi
      layers:
        - state: idle
          map: ["base"]
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: active }
            Charging: { state: charging }
            Idle: { state: idle }
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 8
      sound:
        path: /Audio/_Lua/Effects/anomaly_gravy_idle.ogg
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 1.5
          density: 50
          hard: false
          mask:
            - MobMask
          layer:
            - MobLayer
            - LowImpassable

- type: entity
  id: ZoneAnomalySpringboard
  parent: ZoneAnomalyBaseGravity
  suffix: Stalker, Springboard, Anomaly
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      damage:
        types:
          Compression: 20
    - type: ZoneAnomalyEffectThrow
      force: 40
      distance: 10
    - type: ZoneAnomalyEffectPlaySound
      sound: /Audio/_Lua/Effects/springboard_blowout.ogg
    # - type: ZoneAnomalyEffectSpawn  # SpringboardActiveEffect not ported yet
    #   entry:
    #     - id: SpringboardActiveEffect
    #       amount: 3
    - type: Stealth
    - type: ZoneAnomalyEffectStealth
      idle: -0.3
      activated: -0.3
    - type: ZoneAnomaly
      detectedLevel: 0
      activationDelay: 0
      preparingDelay: 0
      chargeTime: 3
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/springobard.rsi
      layers:
        - state: idle
    - type: AmbientSound
      enabled: true
      volume: -2
      range: 8
      sound:
        path: /Audio/_Lua/Effects/anomaly_gravy_idle.ogg

- type: entity
  parent: ZoneAnomalyBaseGravity
  id: ZoneAnomalyPulse
  suffix: Stalker, Pulse, Anomaly
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      damage:
        types:
          Compression: 80
    - type: ZoneAnomalyEffectThrow
      force: 100
      distance: 70
    - type: ZoneAnomalyEffectPlaySound
      sound: /Audio/_Lua/Effects/springboard_blowout.ogg
    - type: Stealth
    - type: ZoneAnomalyEffectStealth
      idle: -1
      activated: 1
    - type: ZoneAnomaly
      detectedLevel: 4
      activationDelay: 1
      preparingDelay: 0
      chargeTime: 5
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/springobard.rsi
      layers:
        - state: idle
