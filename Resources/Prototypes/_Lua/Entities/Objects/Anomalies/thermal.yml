- type: entity
  parent: ZoneAnomalyBase
  id: ZoneAnomalyBaseThermal
  abstract: true
  components:
  - type: STAnomalyTips
    icon:
      sprite: /Textures/_Lua/Interface/Overlays/anomaly_tips.rsi
      state: fiery

- type: entity
  parent: ZoneAnomalyBaseThermal
  id: ZoneAnomalyJarka
  suffix: Stalker, Jarka, Anomaly
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      fireStacks: 0.25
      damageUpdate: true
      damage:
        types:
          Heat: 2
    - type: ZoneAnomalyEffectDestroy
      whitelist:
        tags:
          - STBolt
    - type: ZoneAnomalyEffectPointLight
    - type: ZoneAnomaly
      detectedLevel: 0
      preparingDelay: 0
      activationDelay: 4
      chargeTime: 0
    - type: Stealth
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/jarka.rsi
      offset: 0, 0.5
      layers:
      - state: idle
        map: ["base"]
    - type: PointLight
      radius: 10
      energy: 12
      color: "#f37011"
      castShadows: true
      enabled: false
    - type: AmbientSound
      volume: -16
      range: 8
      sound:
        path: /Audio/_Lua/Effects/fireball_idle.ogg
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: active }
            Charging: { state: idle }
            Idle: { state: idle }

- type: entity
  parent: ZoneAnomalyJarka
  id: ZoneAnomalyJarkaStrong
  suffix: Stalker, Jarka strong, Anomaly
  components:
    - type: ZoneAnomaly
      detectedLevel: 1
    - type: ZoneAnomalyEffectDamage
      fireStacks: 0.4
      damageUpdate: true
      damage:
        types:
          Heat: 5
    - type: Stealth
    - type: Sprite
      sprite: _Lua/Objects/Anomalies/jarka_strong.rsi

