- type: entity
  id: ZoneAnomalySol
  parent: ZoneAnomalyBaseThermal
  suffix: Stalker, Sol, Anomaly
  components:
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectExplosion
      protoId: Son
      totalIntensity: 300
      slope: 10
      maxTileIntensity: 700
    - type: ZoneAnomalyEffectDestroy
      whitelist:
        tags:
          - STBolt
    - type: ZoneAnomalyEffectPointLight
    - type: ZoneAnomaly
      detectedLevel: 2
      preparingDelay: 0
      activationDelay: 3
      chargeTime: 5
    - type: Sprite
      sprite: _Lua/Objects/Other/Anomalys/sol.rsi
      layers:
        - state: idle
          map: ["base"]
          shader: unshaded
    - type: PointLight
      radius: 10
      energy: 12
      color: "#f3b511"
      castShadows: true
      enabled: false
    - type: AmbientSound
      volume: -16
      range: 8
      sound:
        path: /Audio/_Lua/Effects/fireball_idle.ogg
    - type: GenericVisualizer
      visuals:
        enum.ZoneAnomalyVisuals.Layer:
          base:
            Activated: { state: active }
            Idle: { state: idle }

