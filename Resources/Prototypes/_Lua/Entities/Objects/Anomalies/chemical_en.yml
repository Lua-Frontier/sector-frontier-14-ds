# Beer anomaly - partially ported
# STBaseToxic, STChemicalsDelivery, SyncSprite, STAcidicEffect not ported yet
# Using only ZoneAnomalyBaseChemical as parent

- type: entity
  id: ZoneAnomalyBeer
  name: Beer
  parent: ZoneAnomalyBaseChemical
  suffix: Stalker, Kissel, Anomaly, Beer
  components:
    - type: PointLight
      radius: 3
      energy: 3
      color: "Yellow"
      castShadows: false
    - type: ZoneAnomalyUpdateTriggerCollide
    - type: ZoneAnomalyEffectDamage
      damage:
        types:
          Caustic: 2
    - type: ZoneAnomalyEffectDestroy
      whitelist:
        tags:
        - STBolt
    - type: Sprite
      sprite: _Lua/Objects/Other/Anomalys/beer.rsi
      layers:
        - state: idle
          shader: unshaded
    # STChemicalsDelivery - not ported yet
    # - type: STChemicalsDelivery
    #   reagent: Beer
    #   amount: 20
    #   deliverSound: /Audio/Items/hiss.ogg
    #   entry:
    #     id: STAcidicEffect
    #     amount: 2
    - type: ZoneAnomaly
      detectedLevel: 0
      preparingDelay: 0
      activationDelay: 0
      chargeTime: 0.05
