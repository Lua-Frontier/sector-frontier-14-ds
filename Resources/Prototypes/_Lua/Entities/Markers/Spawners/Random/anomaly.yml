    # ZoneAnomaly - gravity
    - ZoneAnomalyGravi
    - ZoneAnomalyGrabber
    - ZoneAnomalySpringboard
    - ZoneAnomalyPulse
    - ZoneAnomalyVortex
    - ZoneAnomalyGlassShards
    # ZoneAnomaly - thermal
    - ZoneAnomalyJarka
    - ZoneAnomalyJarkaStrong
    - ZoneAnomalySteam
    - ZoneAnomalySol
    # ZoneAnomaly - psy / spatial
    - ZoneAnomalyLamp
